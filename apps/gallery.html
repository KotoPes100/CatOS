<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <style>
    :root {
      /* Морская океаническая палитра */
      --bg-gradient: linear-gradient(135deg, #0b1d28 0%, #112e3d 100%);
      --glass-bg: rgba(20, 60, 80, 0.2);
      --glass-border: rgba(100, 200, 220, 0.15);
      --glass-hover: rgba(100, 200, 220, 0.25);
      --accent: #aae5f0;
      --text-main: #e2f5f8;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box; 
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      user-select: none;
      min-height: 100vh;
    }

    /* Elegant Sea-Glass Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 12px 20px;
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(5, 20, 30, 0.4);
    }

    #fileInput {
      display: none;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(100, 200, 220, 0.3);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.5px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .upload-btn:hover {
      background: var(--glass-hover);
      border-color: rgba(100, 200, 220, 0.6);
      transform: translateY(-1px);
      box-shadow: 0 0 12px rgba(100, 200, 220, 0.2);
    }

    .upload-btn.loading {
      background: rgba(255, 255, 255, 0.05);
      color: #57788a;
      border-color: rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    /* Media Art-Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 24px;
    }

    .media-card {
      position: relative;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(5, 20, 30, 0.3);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: scale(0.95);
      animation: fadeInCard 0.5s forwards ease-out;
    }

    @keyframes fadeInCard {
      to { opacity: 1; transform: scale(1); }
    }

    .media-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(5, 20, 30, 0.5);
      border-color: rgba(100, 200, 220, 0.4);
    }

    .media-card img, .media-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.5s ease;
    }

    .media-card:hover img {
      transform: scale(1.05);
    }

    /* Видео бейдж цвета морской волны */
    .video-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(11, 35, 48, 0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--accent);
      pointer-events: none;
      border: 1px solid rgba(100, 200, 220, 0.3);
    }

    .media-card .media-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(7, 21, 30, 0.9) 0%, rgba(7, 21, 30, 0) 100%);
      color: rgba(226, 245, 248, 0.75);
      font-size: 11px;
      padding: 16px 10px 8px 10px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .media-card:hover .media-name {
      opacity: 1;
    }

    /* Deep Ocean Preview Modal */
    .preview-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(200, 200, 200, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .preview-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .preview-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 60px;
    }

    .preview-content {
      max-width: 95%;
      max-height: 95%;
      border-radius: none;
      box-shadow: 0 24px 64px rgba(3, 10, 15, 0.7);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: none;
    }

    .preview-modal.active .preview-content.active {
      display: block;
      transform: scale(1);
    }

    video.preview-content {
      outline: none;
      background: #000;
    }

    .close-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(100, 200, 220, 0.1);
      border: 1px solid rgba(100, 200, 220, 0.2);
      color: var(--accent);
      font-size: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 100001;
    }

    .close-btn:hover {
      background: var(--glass-hover);
      border-color: rgba(100, 200, 220, 0.4);
    }

    /* Морские Навигационные Стрелки */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(100, 200, 220, 0.05);
      border: 1px solid rgba(100, 200, 220, 0.15);
      color: var(--accent);
      font-size: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 100000;
      user-select: none;
    }

    .nav-btn:hover {
      background: var(--glass-hover);
      border-color: rgba(100, 200, 220, 0.4);
      box-shadow: 0 0 10px rgba(100, 200, 220, 0.15);
    }

    .nav-btn:active {
      transform: translateY(-50%) scale(0.9);
    }

    .nav-btn.prev { left: 24px; }
    .nav-btn.next { right: 24px; }
  </style>
</head>
<body>

  <div class="toolbar">
    <label for="fileInput" id="uploadLabel" class="upload-btn">🌊 Import Media</label>
    <input type="file" id="fileInput" accept="image/*,video/*" onchange="handleMediaImport(this)">
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>

  <div class="preview-modal" id="previewModal" onclick="closePreview()">
    <button class="close-btn" onclick="closePreview()">&times;</button>
    
    <div class="preview-wrapper">
      <button class="nav-btn prev" onclick="navigateMedia(-1, event)">&lt;</button>
      
      <img class="preview-content" id="previewImg" src="" alt="Preview" onclick="event.stopPropagation()">
      <video class="preview-content" id="previewVideo" src="" controls autoplay onclick="event.stopPropagation()"></video>
      
      <button class="nav-btn next" onclick="navigateMedia(1, event)">&gt;</button>
    </div>
  </div>

  <script>
    const fs = window.parent.fs || window.fs;
    
    let mediaList = []; 
    let currentMediaIndex = -1;

    function getFS() {
      return (fs && fs.promises) ? fs : null;
    }

    async function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      const activeFs = getFS();

      if (!activeFs) {
        setTimeout(loadGallery, 100);
        return;
      }

      grid.innerHTML = '';
      mediaList = []; 

      try {
        await activeFs.promises.mkdir('/images').catch(() => {});
        await activeFs.promises.mkdir('/videos').catch(() => {});

        const imageFiles = await activeFs.promises.readdir('/images').catch(() => []);
        const videoFiles = await activeFs.promises.readdir('/videos').catch(() => []);

        const allFiles = [
          ...imageFiles.map(name => ({ name, path: `/images/${name}`, type: 'image' })),
          ...videoFiles.map(name => ({ name, path: `/videos/${name}`, type: 'video' }))
        ];

        allFiles.forEach(async (file, index) => {
          try {
            const buffer = await activeFs.promises.readFile(file.path);
            const blob = new Blob([buffer]);
            const blobUrl = URL.createObjectURL(blob);

            mediaList.push({ url: blobUrl, type: file.type, name: file.name });
            const globalIndex = mediaList.length - 1;

            const card = document.createElement('div');
            card.className = 'media-card';
            card.style.animationDelay = `${index * 0.04}s`;

            if (file.type === 'video') {
              card.innerHTML = `
                <video src="${blobUrl}" muted></video>
                <div class="video-badge">▶</div>
                <div class="media-name">${file.name}</div>
              `;
            } else {
              card.innerHTML = `
                <img src="${blobUrl}" alt="${file.name}">
                <div class="media-name">${file.name}</div>
              `;
            }

            card.onclick = () => viewMedia(globalIndex);
            grid.appendChild(card);
          } catch (e) {
            console.error("File load failed:", e);
          }
        });
      } catch (err) {
        console.error("Gallery runtime breakdown:", err);
      }
    }

    async function handleMediaImport(input) {
      const activeFs = getFS();
      if (!activeFs || !input.files.length) return;

      const label = document.getElementById('uploadLabel');
      label.className = "upload-btn loading";
      label.textContent = "⏳ Storing...";

      for (let file of input.files) {
        try {
          const arrayBuffer = await file.arrayBuffer();
          const uint8Array = new Uint8Array(arrayBuffer);
          
          const isVideo = file.type.startsWith('video/') || file.name.endsWith('.webm');
          const savePath = isVideo ? `/videos/${file.name}` : `/images/${file.name}`;

          await activeFs.promises.writeFile(savePath, uint8Array);
        } catch (err) {
          alert(`Failed to store file: ${err}`);
        }
      }

      label.className = "upload-btn";
      label.textContent = "🌊 Import Media";
      input.value = '';
      loadGallery();
    }

    function viewMedia(index) {
      if (index < 0 || index >= mediaList.length) return;
      currentMediaIndex = index;

      const modal = document.getElementById('previewModal');
      const imgTarget = document.getElementById('previewImg');
      const videoTarget = document.getElementById('previewVideo');
      
      const currentItem = mediaList[index];

      imgTarget.classList.remove('active');
      videoTarget.classList.remove('active');
      videoTarget.pause(); 

      if (currentItem.type === 'video') {
        videoTarget.src = currentItem.url;
        videoTarget.classList.add('active');
      } else {
        imgTarget.src = currentItem.url;
        imgTarget.classList.add('active');
      }

      modal.classList.add('active');
    }

    function navigateMedia(direction, event) {
      event.stopPropagation(); 
      
      let nextIndex = currentMediaIndex + direction;
      
      if (nextIndex >= mediaList.length) nextIndex = 0;
      if (nextIndex < 0) nextIndex = mediaList.length - 1;

      viewMedia(nextIndex);
    }

    function closePreview() {
      const modal = document.getElementById('previewModal');
      document.getElementById('previewVideo').pause(); 
      modal.classList.remove('active');
    }

    loadGallery();
  </script>
</body>
</html>
