function scoreResult(item, query) {
  const k1 = 1.5;
  const b = 0.75;

  const goodDomains = [
    "wikipedia.org",
    "britannica.com",
    "arxiv.org",
    ".edu",
    "nature.com"
  ];

  const badDomains = [
    "instagram.com",
    "tiktok.com",
    "facebook.com"
  ];

  const title = (item.title || "").toLowerCase();
  const snippet = (item.snippet || "").toLowerCase();
  const text = title + " " + snippet;

  const isExact = query.startsWith('"') && query.endsWith('"');
  const cleanQuery = isExact ? query.slice(1, -1).toLowerCase() : query.toLowerCase();

  const words = cleanQuery.split(/\s+/).filter(Boolean);

  const docLength = text.split(/\s+/).length || 1;
  const avgDocLength = 80;

  let score = 0;

  // -------------------------
  // ❗ EXACT MATCH (кавычки)
  // -------------------------
  if (isExact) {
    if (text.includes(cleanQuery)) {
      score += 50;
    } else {
      score -=1000; // сразу выкидываем
    }
  }

  // -------------------------
  // 📊 BM25
  // -------------------------
  words.forEach(word => {
    const regex = new RegExp(`\\b${word}\\b`, 'g');

    const tfTitle = (title.match(regex) || []).length;
    const tfSnippet = (snippet.match(regex) || []).length;

    const tf = tfTitle * 2 + tfSnippet;

    if (tf === 0) return;

    const idf = Math.log(1 + (1 / (tf + 1)));

    const numerator = tf * (k1 + 1);
    const denominator = tf + k1 * (1 - b + b * (docLength / avgDocLength));

    score += idf * (numerator / denominator);
  });

  // -------------------------
  // 🎯 Совпадения
  // -------------------------

  // точная фраза
  if (title.includes(cleanQuery)) score += 15;
  if (snippet.includes(cleanQuery)) score += 5;

  // все слова есть
  const allWordsPresent = words.every(w => text.includes(w));
  if (allWordsPresent) score += 10;

  // начало заголовка
  if (words.length && title.startsWith(words[0])) {
    score += 5;
  }

  // -------------------------
  // 🌍 Домены
  // -------------------------

  if (goodDomains.some(d => item.link.includes(d))) {
    score += 8;
  }
    if (item.link.includes("wikipedia.org") || item.link.includes("wikimedia")) {
      score += 500;
    }
        if (item.link.includes("reddit")) {
      score -= 2.5;
    }
  if (badDomains.some(d => item.link.includes(d))) {
    score -= 5;
  }

  // -------------------------
  // 🚫 Анти-спам
  // -------------------------
  // переспам (одно слово много раз)
  words.forEach(word => {
    const count = (text.match(new RegExp(word, 'g')) || []).length;
    if (count > 10) score -= 5;
  });

  // -------------------------
  // 🧠 Намерение (очень простой)
  // -------------------------

  if (
    cleanQuery.includes("что такое") ||
    cleanQuery.includes("what is")
  ) {
    if (item.link.includes("wikipedia")) {
      score += 10;
    }
  }

  return score;
}

document.addEventListener('click', function(e) {
  let el = e.target;
  // Ищем клик по ссылке (тег <a>)
  while (el && el !== document) {
    if (el.tagName === 'A' && el.href) {
      e.preventDefault(); // Блокируем стандартное открытие (особенно target="_blank")
      e.stopPropagation();
      
      // Отправляем команду в browser.html
      window.parent.postMessage({
        type: 'lakeOpenNewTab', // Откроет в новой вкладке!
        url: el.href
      }, '*');
      
      return false;
    }
    el = el.parentElement;
  }
}, true);

// Следим за динамическим изменением заголовка (через MutationObserver)
const titleObserver = new MutationObserver(() => syncTabMeta());
const titleElement = document.querySelector('title');
if (titleElement) {
  titleObserver.observe(titleElement, { childList: true, characterData: true });
}

// Отправляем мета-данные при изменении хэша и при первой загрузке
window.addEventListener('hashchange', syncTabMeta);
window.addEventListener('load', syncTabMeta);
syncTabMeta();
