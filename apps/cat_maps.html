<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
      * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; overflow: hidden; background: #eee;}
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
        
.controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100000;
            font-family: sans-serif;
        }
        input, button{
      backdrop-filter: blur(3px) saturate(110%) !important;
      -webkit-backdrop-filter: blur(3px) saturate(110%) !important;
background: rgba(255, 255, 255, 0.12);
border: 1px solid rgba(255, 255, 255, 0.28);
border-radius: 25px;
height: 50px;
width: 50px;
font-size: 22px;
cursor: pointer;
color: deepskyblue;
font-weight: bold;
z-index: 1000;
box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
outline: none;
}

                .geo-circle {
            width: 15px !important; height: 15px !important;
            margin: -14px 0 0 -14px !important; border-radius: 50%;
            background: deepskyblue !important; border: 4px solid #00ffcc !important;
            box-shadow: 0 0 15px rgba(0,255,204,0.6) !important;
            animation: pulse 1s infinite; 
            transform: translate(-50%, -50%); 
        }
        
        .search-marker {
            width: 20px;
            height: 20px;
            background: #0fc;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: pulse 1s infinite;
        }
                @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(0,255,204,0.6); }
            50% { box-shadow: 0 0 25px rgba(0,255,204,0.9); }
            100% { box-shadow: 0 0 15px rgba(0,255,204,0.6); }
        }
   @media (max-width: 750px){
input, button{width: 35px; height: 35px; font-size: 11px;}
}
.search-item {
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

.search-item:last-child {
    border-bottom: none;
}
</style>
</head>

// Кнопка местоположения (ОДИН обработчик)
document.getElementById('btn-location').addEventListener('click', () => {
  if (!navigator.geolocation) {
        try{
      message("onPanel", 'Location is not available')
} catch {
    alert('Location is not available');
}
    canLocate = false;
    return;
  }
  canLocate = true;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      
      if (locationMarker) {
        locationMarker.remove();
      }
      
      const el = document.createElement('div');
      el.className = 'geo-circle';
      
      locationMarker = new maplibregl.Marker({ 
    element: el, 
    anchor: 'center' // Указывает, что координата GPS должна быть строго по центру DOM-элемента
})
.setLngLat([longitude, latitude])
.addTo(map);
      
      map.flyTo({
        center: [longitude, latitude],
        zoom: 15,
        essential: true
      });
    },
    (err) => {
      console.error('Location error: ' + err.message);
            try{
      message("onPanel", 'Location error: ' + err.message)
} catch {
      alert('Location error: ' + err.message);
}
    },
    { enableHighAccuracy: true }
  );
});

// ✅ Автоматическая геолокация при загрузке (ОДИН раз, опционально)
window.addEventListener('load', () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        
        if (locationMarker) {
          locationMarker.remove();
        }
        
        const el = document.createElement('div');
        el.className = 'geo-circle';
        
        locationMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
          .setLngLat([longitude, latitude])
          .addTo(map);
        
        map.flyTo({
          center: [longitude, latitude],
          zoom: 15,
          essential: true
        });

        console.error('Location error: ' + err.message);
        canLocate = false;

});

// ========================================================
// ВСТРОЙ ЭТОТ БЛОК В САМЫЙ КОНЕЦ СКРИПТА (ПЕРЕД )
// ЛОГИКА ЖИВЫХ ПОДСКАЗОК ЧЕРЕЗ NOMINATIM
// ========================================================
const searchInput = document.getElementById('search-input');
const resultsBox = document.getElementById('search-results');
let searchMarker = null; 
let debounceTimer;

// Отслеживаем ввод текста пользователем
searchInput.addEventListener('input', function() {
  const query = searchInput.value.trim();
  
  clearTimeout(debounceTimer);
  
  // Если стёрли текст или ввели меньше 3 символов — прячем список вариантов
  if (query.length < 3) {
    resultsBox.innerHTML = '';
    return;
  }

  // Задержка 400мс, чтобы не отправлять запросы серверу на каждую букву
  debounceTimer = setTimeout(() => {
    // Запрос подсказок у Nominatim (limit=5 возвращает 5 лучших совпадений)
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(query)}`;

    fetch(url)
      .then(res => res.json())
      .then(data => {
        resultsBox.innerHTML = ''; // Чистим старые подсказки
        resultsBox.style.display="inline-block";

        if (data && data.length > 0) {
          data.forEach(place => {
            // Создаем строчку элемента для списка под инпутом
            const item = document.createElement('div');
            item.className = 'search-item';
            item.innerText = place.display_name;

            // Логика клика на подсказку из списка
            item.addEventListener('click', () => {
              const lon = parseFloat(place.lon);
              const lat = parseFloat(place.lat);

              // Подставляем текст в инпут и скрываем результаты
              searchInput.value = place.display_name;
              resultsBox.innerHTML = '';
              resultsBox.style.display="none";

              // Удаляем старую метку поиска
              if (searchMarker) searchMarker.remove();
              
              // Ставим красивый маркер на выбранное место
              const markerEl = document.createElement('div');
              markerEl.className = 'search-marker';

              searchMarker = new maplibregl.Marker({ element: markerEl })
                .setLngLat([lon, lat])
                .addTo(map);

              // Летим к выбранной точке
              map.flyTo({
                center: [lon, lat],
                zoom: 14,
                essential: true
              });
            });

            resultsBox.appendChild(item);
          });
        }
      })
      .catch(err => console.error('Nominatim autocomplete error:', err));
  }, 400);
});

// Прячем меню подсказок, если кликнули по самой карте в любое место
map.on('click', () => {
  resultsBox.innerHTML = '';
  resultsBox.style.display="none";
});
map.on('load', () => {
    const tomTomKey = '3hN1xt03aFgKGkPm9uIdm4PO7td7uNTm'; 

    map.addSource('tomtom-traffic-source', {
        'type': 'raster',
        'tiles': [
            // Используем "relative" (вместо absolute). Этот стиль отдаёт зелёный-жёлтый-красный
            `https://a.api.tomtom.com/traffic/map/4/tile/flow/relative/{z}/{x}/{y}.png?key=${tomTomKey}`,
            `https://b.api.tomtom.com/traffic/map/4/tile/flow/relative/{z}/{x}/{y}.png?key=${tomTomKey}`,
            `https://c.api.tomtom.com/traffic/map/4/tile/flow/relative/{z}/{x}/{y}.png?key=${tomTomKey}`,
            `https://d.api.tomtom.com/traffic/map/4/tile/flow/relative/{z}/{x}/{y}.png?key=${tomTomKey}`
        ],
        // Оставляем твой tileSize = 100, чтобы они были тонкими и аккуратными
        'tileSize': 75
    });

    map.addLayer({
        'id': 'tomtom-traffic-layer',
        'type': 'raster',
        'source': 'tomtom-traffic-source',
        'minzoom': 0,
        'maxzoom': 22,
        'paint': {
            // УБИРАЕМ hue-rotate, чтобы цвета не ломались!
            'raster-opacity': 0.8,
            'raster-resampling': 'linear'
        }
    }, 'water_name_line');
});
